<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Schedule Activity - Notificator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #6467f233;
            border-radius: 10px;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(45%) sepia(87%) saturate(1915%) hue-rotate(218deg) brightness(98%) contrast(92%);
            cursor: pointer;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="mx-auto max-w-lg min-h-screen bg-white dark:bg-slate-900 shadow-xl flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between px-4 py-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">close</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">New Activity</h1>
<button class="px-4 py-1.5 bg-primary text-white rounded-full font-medium text-sm hover:opacity-90 transition-opacity">
                    Save
                </button>
</div>
</header>
<main class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
<!-- Activity Title Section -->
<section class="space-y-2">
<label class="block text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1" for="title">
                    Activity Title
                </label>
<div class="relative group">
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl h-14 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all text-lg font-medium" id="title" placeholder="What needs to be done?" type="text"/>
</div>
</section>
<!-- Label Selector Section -->
<section class="space-y-2">
<label class="block text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1" for="category">
                    Category Label
                </label>
<div class="relative">
<select class="appearance-none w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl h-14 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all cursor-pointer pr-10" id="category">
<option value="work">💼 Work Project</option>
<option value="personal">👤 Personal Task</option>
<option value="health">🧘 Health &amp; Wellness</option>
<option value="finance">💳 Finance</option>
<option value="social">🤝 Social Event</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400">unfold_more</span>
</div>
</div>
</section>
<!-- Schedule Section -->
<section class="space-y-4">
<div class="flex items-center justify-between ml-1">
<label class="block text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                        Schedule
                    </label>
<span class="text-xs font-medium text-primary bg-primary/10 px-2 py-0.5 rounded-full">Automatic detection</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col space-y-2">
<span class="text-xs font-medium text-slate-400 ml-1">Date</span>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl h-12 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all font-medium" type="date" value="2023-10-25"/>
</div>
</div>
<div class="flex flex-col space-y-2">
<span class="text-xs font-medium text-slate-400 ml-1">Time</span>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl h-12 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all font-medium" type="time" value="09:00"/>
</div>
</div>
</div>
<!-- Calendar View Minimal -->
<div class="mt-2 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between mb-4">
<span class="font-bold text-slate-700 dark:text-slate-200">October 2023</span>
<div class="flex gap-2">
<button class="p-1 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"><span class="material-symbols-outlined text-sm">chevron_left</span></button>
<button class="p-1 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"><span class="material-symbols-outlined text-sm">chevron_right</span></button>
</div>
</div>
<div class="grid grid-cols-7 gap-1 text-center">
<span class="text-[10px] font-bold text-slate-400 uppercase">S</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">M</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">T</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">W</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">T</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">F</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">S</span>
<!-- Empty slots -->
<div class="h-8"></div><div class="h-8"></div><div class="h-8"></div><div class="h-8"></div><div class="h-8"></div><div class="h-8"></div>
<button class="h-8 flex items-center justify-center text-sm font-medium hover:bg-primary/10 rounded-lg">1</button>
<button class="h-8 flex items-center justify-center text-sm font-medium hover:bg-primary/10 rounded-lg">2</button>
<button class="h-8 flex items-center justify-center text-sm font-medium hover:bg-primary/10 rounded-lg">3</button>
<button class="h-8 flex items-center justify-center text-sm font-medium hover:bg-primary/10 rounded-lg">4</button>
<button class="h-8 flex items-center justify-center text-sm font-medium bg-primary text-white rounded-lg shadow-sm">5</button>
<button class="h-8 flex items-center justify-center text-sm font-medium hover:bg-primary/10 rounded-lg">6</button>
<button class="h-8 flex items-center justify-center text-sm font-medium hover:bg-primary/10 rounded-lg">7</button>
</div>
</div>
</section>
<!-- Notification Preference -->
<section class="space-y-4 pt-4 border-t border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between">
<div>
<h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">Notification Alert</h3>
<p class="text-xs text-slate-500 dark:text-slate-400">Notify me before the activity starts</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div class="relative">
<select class="appearance-none w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl h-12 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all cursor-pointer pr-10 text-sm">
<option value="at-time">At time of event</option>
<option value="5-min">5 minutes before</option>
<option selected="" value="15-min">15 minutes before</option>
<option value="1-hour">1 hour before</option>
<option value="1-day">1 day before</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-base">expand_more</span>
</div>
</div>
</section>
</main>
<!-- Footer / Action Area -->
<footer class="p-6 bg-slate-50 dark:bg-slate-800/30 border-t border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-center gap-2 text-slate-400 text-xs">
<span class="material-symbols-outlined text-sm">lock</span>
<span>End-to-end encrypted notification service</span>
</div>
</footer>
</div>
</body></html>
