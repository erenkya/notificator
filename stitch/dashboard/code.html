<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f8fafc",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .tree-line {
            position: absolute;
            left: 1.25rem;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: #e2e8f0;
        }
        .tree-node-connector {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            width: 0.75rem;
            height: 1px;
            background-color: #e2e8f0;
        }
        .last-node::after {
            content: '';
            position: absolute;
            left: 1.25rem;
            top: 50%;
            bottom: 0;
            width: 2px;
            background-color: #f8fafc; /* Matches background to cut off the line */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-xl">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary text-xl">account_tree</span>
</div>
<h1 class="text-lg font-bold tracking-tight">Notificator</h1>
</div>
<div class="flex gap-2">
<button class="p-2 hover:bg-slate-200/50 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">search</span>
</button>
<button class="p-2 hover:bg-slate-200/50 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">more_vert</span>
</button>
</div>
</header>
<!-- Main Feed -->
<main class="flex-1 p-4 space-y-8">
<!-- Group 1 -->
<section class="relative">
<div class="flex items-center gap-2 mb-2 px-1">
<span class="w-2 h-2 rounded-full bg-emerald-500"></span>
<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Label 1</h3>
</div>
<!-- Tree Structure Container -->
<div class="relative ml-1">
<div class="tree-line"></div>
<!-- Activity Item -->
<div class="relative pl-8 py-2">
<div class="tree-node-connector"></div>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-xl shadow-sm hover:shadow-md transition-shadow group cursor-pointer">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">Activity 1.1</span>
<span class="text-xs text-slate-400 mt-1">Deployment successful</span>
</div>
<span class="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded uppercase">2m</span>
</div>
</div>
</div>
<!-- Activity Item -->
<div class="relative pl-8 py-2">
<div class="tree-node-connector"></div>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-xl shadow-sm hover:shadow-md transition-shadow group cursor-pointer">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">Activity 1.2</span>
<span class="text-xs text-slate-400 mt-1">API Endpoint updated</span>
</div>
<span class="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded uppercase">15m</span>
</div>
</div>
</div>
</div>
</section>
<!-- Group 2 -->
<section class="relative">
<div class="flex items-center gap-2 mb-2 px-1">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Project Delta</h3>
</div>
<div class="relative ml-1">
<div class="tree-line"></div>
<!-- Activity Item -->
<div class="relative pl-8 py-2">
<div class="tree-node-connector"></div>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-xl shadow-sm hover:shadow-md transition-shadow cursor-pointer">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">Resource Created</span>
<span class="text-xs text-slate-400 mt-1">New database instance initialized</span>
</div>
<span class="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded uppercase">1h</span>
</div>
</div>
</div>
<!-- Activity Item -->
<div class="relative pl-8 py-2">
<div class="tree-node-connector"></div>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-xl shadow-sm hover:shadow-md transition-shadow cursor-pointer">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">Policy Alert</span>
<span class="text-xs text-slate-400 mt-1">Access control modified by admin</span>
</div>
<span class="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded uppercase">3h</span>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="sticky bottom-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1]">grid_view</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">
<span class="material-symbols-outlined">notifications</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">
<span class="material-symbols-outlined">schedule</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
</div>
</body></html>
