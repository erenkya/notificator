<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notificator - Create Label</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .notion-shadow {
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05), 0px 4px 12px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display">
<!-- Main Container simulating a mobile view / dashboard background -->
<div class="relative w-full max-w-md h-[800px] bg-white dark:bg-slate-900 overflow-hidden shadow-2xl rounded-[2rem] border-8 border-slate-200 dark:border-slate-800 flex flex-col">
<!-- Header Placeholder -->
<div class="p-6 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">notifications</span>
<span class="font-bold text-slate-900 dark:text-slate-100">Notificator</span>
</div>
<button class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-sm">settings</span>
</button>
</div>
<!-- Dashboard Content Simulation -->
<div class="p-6 flex-1 space-y-4">
<div class="h-32 w-full bg-slate-50 dark:bg-slate-800 rounded-xl p-4 flex flex-col justify-end">
<div class="h-4 w-24 bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
<div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded opacity-50"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-24 bg-slate-50 dark:bg-slate-800 rounded-xl"></div>
<div class="h-24 bg-slate-50 dark:bg-slate-800 rounded-xl"></div>
</div>
</div>
<!-- Overlay / Backdrop -->
<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-10"></div>
<!-- Bottom Sheet UI -->
<div class="absolute bottom-0 left-0 w-full z-20 bg-white dark:bg-slate-900 rounded-t-[2rem] notion-shadow transform transition-transform duration-300">
<!-- BottomSheetHandle Component -->
<div class="flex flex-col items-stretch">
<button class="flex h-6 w-full items-center justify-center pt-2">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</button>
<div class="flex-1 px-6 pb-8 pt-4">
<div class="flex items-center justify-between mb-6">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-semibold leading-tight tracking-tight">Create New Label</h2>
<button class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Label Name Input -->
<div class="space-y-2 mb-8">
<label class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider ml-1">Label Name</label>
<div class="relative group">
<input class="w-full h-12 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Work, Urgent, Personal" type="text"/>
</div>
</div>
<!-- Color Picker UI -->
<div class="space-y-4 mb-8">
<div class="flex items-center justify-between">
<label class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider ml-1">Select Icon Color</label>
<span class="text-[10px] text-slate-400 font-medium">12 presets</span>
</div>
<!-- Color Grid -->
<div class="grid grid-cols-6 gap-3">
<label class="relative flex items-center justify-center cursor-pointer group">
<input checked="" class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-primary/20 border-2 border-transparent peer-checked:border-primary transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-primary"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-rose-100 dark:bg-rose-900/30 border-2 border-transparent peer-checked:border-rose-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-rose-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-amber-100 dark:bg-amber-900/30 border-2 border-transparent peer-checked:border-amber-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-amber-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-emerald-100 dark:bg-emerald-900/30 border-2 border-transparent peer-checked:border-emerald-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-emerald-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-sky-100 dark:bg-sky-900/30 border-2 border-transparent peer-checked:border-sky-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-sky-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-violet-100 dark:bg-violet-900/30 border-2 border-transparent peer-checked:border-violet-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-violet-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-slate-200 dark:bg-slate-700 border-2 border-transparent peer-checked:border-slate-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-slate-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-pink-100 dark:bg-pink-900/30 border-2 border-transparent peer-checked:border-pink-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-pink-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-teal-100 dark:bg-teal-900/30 border-2 border-transparent peer-checked:border-teal-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-teal-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-orange-100 dark:bg-orange-900/30 border-2 border-transparent peer-checked:border-orange-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-orange-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-indigo-100 dark:bg-indigo-900/30 border-2 border-transparent peer-checked:border-indigo-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-indigo-500"></div>
</div>
</label>
<label class="relative flex items-center justify-center cursor-pointer">
<input class="peer hidden" name="color-select" type="radio"/>
<div class="size-10 rounded-full bg-lime-100 dark:bg-lime-900/30 border-2 border-transparent peer-checked:border-lime-500 transition-all flex items-center justify-center">
<div class="size-6 rounded-full bg-lime-500"></div>
</div>
</label>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-primary text-white font-semibold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Create Label</span>
<span class="material-symbols-outlined text-lg">add_circle</span>
</button>
</div>
</div>
</div>
<!-- Safe Area Bottom Spacing -->
<div class="h-10 bg-white dark:bg-slate-900"></div>
</div>
<!-- Navigation Bar Mockup -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-900 dark:bg-slate-100 rounded-full opacity-20"></div>
</div>
</body></html>
